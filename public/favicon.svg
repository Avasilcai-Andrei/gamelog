<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="vauntd-stroke" x1="14" y1="48" x2="52" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4a90d9"/>
      <stop offset="1" stop-color="#ff9800"/>
    </linearGradient>
    <linearGradient id="vauntd-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d2348"/>
      <stop offset="1" stop-color="#0c0f1f"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#vauntd-bg)"/>
  <!-- "V" that doubles as a rising arrow: skill ascending + achievement earned -->
  <path d="M15 18 L29 46 L51 9" stroke="url(#vauntd-stroke)" stroke-width="7.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arrowhead at the top of the rising arm -->
  <path d="M41 10 L51 9 L50 20" stroke="url(#vauntd-stroke)" stroke-width="7.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
